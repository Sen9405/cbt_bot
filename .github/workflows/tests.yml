name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Create .env for tests
      run: |
        echo "CBT_BOT_TOKEN=test_token_123" > .env
        echo "MAX_BOT_TOKEN=test_token_456" >> .env
        echo "ADMIN_TG_ID=12345" >> .env
        echo "MAX_BOT_ADMIN_ID=67890" >> .env

    - name: Run tests
      run: python -m pytest tests/ -v --tb=short

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install detect-secrets
      run: pip install detect-secrets

    - name: Verify secrets baseline
      run: python .github/scripts/verify_secrets_baseline.py
